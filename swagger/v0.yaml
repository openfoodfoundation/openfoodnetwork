          in: path
          description: Enterprise ID
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/enterprise_shopfront'
              examples:
                example:
                  value:
                    id: 3
                    name: Green Hub
                    description: Fresh local produce
                    latitude: -37.817
                    longitude: 144.965
                    long_description: null
                    website: https://greenhub.example.com
                    instagram: null
                    linkedin: null
                    twitter: null
                    facebook: null
                    is_primary_producer: false
                    is_distributor: true
                    phone: "0412345678"
                    whatsapp_phone: null
                    whatsapp_url: null
                    visible: public
                    email_address: "ua.elpmaxe@buhneerg"
                    hash: green-hub
                    logo: https://example.com/logo/medium.jpg
                    promo_image: https://example.com/promo/large.jpg
                    path: /green-hub/shop
                    category: hub
                    active: true
                    orders_close_at: "2024-06-30T23:59:59Z"
                    pickup: true
                    delivery: false
                    preferred_product_low_stock_display: false
                    hide_ofn_navigation: false
                    white_label_logo: null
                    white_label_logo_link: null
                    address:
                      id: 1
                      firstname: null
                      lastname: null
                      address1: 10 Market Street
                      address2: null
                      city: Melbourne
                      zipcode: "3000"
                      state_name: VIC
                      state_id: 1
                      country_id: 1
                      country_name: Australia
                    producers:
                      - id: 1
                        name: Green Farm
                    hubs: []
                    taxons:
                      - id: 1
                        name: Vegetables
                        permalink: vegetables
                        position: 1
                    supplied_taxons: []
                    supplied_properties: []
                    distributed_properties: []

  /shops/closed_shops:
    get:
      summary: List closed shops
      description: |
        Returns enterprises that are set up as distributors but currently have
        no open order cycles. No authentication required.
      tags:
        - Shops
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/enterprise_shopfront'

  # ============================================================
  # ORDER CYCLES
  # ============================================================

  /order_cycles/{id}/products:
    get:
      summary: List products available in an order cycle
      description: |
        Returns paginated JSON of products distributed in this order cycle,
        scoped to the given distributor. Supports full text search via Ransack `q` params.
        The distributor context is required.
      tags:
        - Order Cycles
      parameters:
        - name: id
          in: path
          description: Order cycle ID
          required: true
          schema:
            type: integer
        - name: distributor
          in: query
          description: Distributor enterprise ID (required)
          required: true
          schema:
            type: integer
        - name: q
          in: query
          description: Ransack search string for product/variant name
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: successful — raw JSON string of products array
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  description: Product with variants, scoped to distributor pricing
        '404':
          description: order cycle not open or not found

  /order_cycles/{id}/taxons:
    get:
      summary: List taxons distributed in an order cycle
      description: |
        Returns all taxons associated with products in this order cycle.
        No authentication required. Response is cached.
      tags:
        - Order Cycles
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: distributor
          in: query
          description: Distributor enterprise ID
          schema:
            type: integer
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/taxon'
              examples:
                example:
                  value:
                    - id: 1
                      name: Vegetables
                      permalink: vegetables
                      position: 1
                    - id: 2
                      name: Fruit
                      permalink: fruit
                      position: 2

  /order_cycles/{id}/properties:
    get:
      summary: List product properties distributed in an order cycle
      description: |
        Returns all product properties (e.g. "Organic", "Biodynamic") for products
        distributed in this order cycle. No authentication required. Response is cached.
      tags:
        - Order Cycles
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: distributor
          in: query
          description: Distributor enterprise ID
          schema:
            type: integer
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/property'

  /order_cycles/{id}/producer_properties:
    get:
      summary: List producer properties distributed in an order cycle
      description: |
        Returns all producer-level properties for enterprises that supply products
        in this order cycle. No authentication required. Response is cached.
      tags:
        - Order Cycles
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: distributor
          in: query
          description: Distributor enterprise ID
          schema:
            type: integer
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/property'

  # ============================================================
  # EXCHANGE PRODUCTS
  # ============================================================

  /exchanges/{id}/products:
    get:
      summary: List products available for an exchange
      description: |
        Lists products that can be added to the given exchange.
        Supports two query modes:

        **Mode 1 — by exchange ID** (pass `exchange_id` in query or use the path `id`):
        Returns all products the exchange sender can supply.

        **Mode 2 — by parameters** (omit `exchange_id`): Requires `enterprise_id`, `incoming`,
        and for outgoing exchanges, `order_cycle_id`.

        Supports optional pagination.
      tags:
        - Exchanges
      security:
        - spree_api_key_header: []
        - spree_api_key_param: []
      parameters:
        - name: id
          in: path
          description: Exchange ID
          required: true
          schema:
            type: integer
        - name: enterprise_id
          in: query
          description: Supplier enterprise ID (used when not looking up by exchange_id)
          schema:
            type: integer
        - name: order_cycle_id
          in: query
          description: Order cycle ID (required for outgoing exchanges in mode 2)
          schema:
            type: integer
        - name: incoming
          in: query
          description: Whether this is an incoming exchange
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
        - name: per_page
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items:
                      $ref: '#/components/schemas/exchange_product'
                  pagination:
                    $ref: '#/components/schemas/pagination'
              examples:
                example:
                  value:
                    products:
                      - name: Tomatoes
                        supplier_name: Green Farm
                        image_url: https://example.com/images/mini/tomato.jpg
                        variants:
                          - id: 10
                            label: 1 kg
                          - id: 11
                            label: 500 g
                    pagination:
                      results: 1
                      pages: 1
                      page: 1
                      per_page: 100

  # ============================================================
  # CUSTOMERS
  # ============================================================

  /customers:
    get:
      summary: List customers for current user's enterprises
      description: |
        Returns all visible customers belonging to enterprises managed by the authenticated user.
        No authorization check — relies on session/token identification.
      tags:
        - Customers
      security:
        - spree_api_key_header: []
        - spree_api_key_param: []
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/customer'
              examples:
                example:
                  value:
                    - id: 1
                      enterprise_id: 3
                      first_name: Alice
                      last_name: Springs
                      code: CUST001
                      email: alice@example.com
                      allow_charges: false

  /customers/{id}:
    put:
      summary: Update customer
      tags:
        - Customers
      security:
        - spree_api_key_header: []
        - spree_api_key_param: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - customer
              properties:
                customer:
                  type: object
                  properties:
                    code:
                      type: string
                      example: CUST001
                    email:
                      type: string
                      example: alice@example.com
                    enterprise_id:
                      type: integer
                      example: 3
                    allow_charges:
                      type: boolean
                      description: |
                        When set to true, triggers Stripe recurring payment setup and returns
                        `gateway_recurring_payment_client_secret` in the response.
                      example: false
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/customer'
        '422':
          description: invalid resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_response'

  # ============================================================
  # ENTERPRISE FEES
  # ============================================================

  /enterprise_fees/{id}:
    delete:
      summary: Delete enterprise fee
      tags:
        - Enterprise Fees
      security:
        - spree_api_key_header: []
        - spree_api_key_param: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: no content
        '403':
          description: forbidden — fee could not be deleted
          content:
            text/plain:
              example: Enterprise fee is in use and cannot be deleted.
        '401':
          description: unauthorized

  # ============================================================
  # PRODUCT IMAGES
  # ============================================================

  /product_images/{product_id}:
    post:
      summary: Upload or replace product image
      description: |
        Uploads an image for the specified product. If the product already has an image,
        it is replaced. Returns the serialized image object.
        Request must be sent as `multipart/form-data`.
      tags:
        - Product Images
      security:
        - spree_api_key_header: []
        - spree_api_key_param: []
      parameters:
        - name: product_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file (JPEG, PNG, GIF, WebP)
      responses:
        '200':
          description: image updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/image'
              examples:
                example:
                  value:
                    id: 1
                    alt: null
                    thumb_url: https://example.com/images/mini/tomato.jpg
                    small_url: https://example.com/images/small/tomato.jpg
                    image_url: https://example.com/images/product/tomato.jpg
                    large_url: https://example.com/images/large/tomato.jpg
        '201':
          description: image created (first upload for this product)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/image'
        '422':
          description: invalid resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_response'

  # ============================================================
  # STATES
  # ============================================================

  /states:
    get:
      summary: List states / provinces
      description: |
        Returns states ordered by name. Can be filtered by country.
        No authentication required.
      tags:
        - States
      parameters:
        - name: country_id
          in: query
          description: Filter states by country ID
          schema:
            type: integer
        - name: q[name_cont]
          in: query
          description: Filter by name (Ransack contains)
          schema:
            type: string
        - name: q[abbr_eq]
          in: query
          description: Filter by abbreviation
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: per_page
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/state'
              examples:
                example:
                  value:
                    - id: 1
                      name: Victoria
                      abbr: VIC
                      country_id: 1
                    - id: 2
                      name: New South Wales
                      abbr: NSW
                      country_id: 1

  /states/{id}:
    get:
      summary: Show state
      description: No authentication required.
      tags:
        - States
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/state'
        '404':
          description: not found

  # ============================================================
  # TAXONS
  # ============================================================

  /taxons:
    get:
      summary: List taxons
      description: |
        Returns taxons. Can be filtered by IDs or via Ransack.
        No authentication required.
      tags:
        - Taxons
      parameters:
        - name: ids
          in: query
          description: Comma-separated list of taxon IDs to fetch
          schema:
            type: string
          example: "1,2,5"
        - name: q[name_cont]
          in: query
          description: Filter by name (Ransack contains)
          schema:
            type: string
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/taxon'
              examples:
                example:
                  value:
                    - id: 1
                      name: Vegetables
                      permalink: vegetables
                      position: 1
                    - id: 2
                      name: Fruit
                      permalink: fruit
                      position: 2

    post:
      summary: Create taxon
      tags:
        - Taxons
      security:
        - spree_api_key_header: []
        - spree_api_key_param: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - taxon
              properties:
                taxon:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                      example: Vegetables
                    position:
                      type: integer
                      example: 1
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/taxon'
        '422':
          description: invalid resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_response'

  /taxons/{id}:
    put:
      summary: Update taxon
      tags:
        - Taxons
      security:
        - spree_api_key_header: []
        - spree_api_key_param: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - taxon
              properties:
                taxon:
                  type: object
                  properties:
                    name:
                      type: string
                    position:
                      type: integer
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/taxon'
        '422':
          description: invalid resource

    delete:
      summary: Delete taxon
      tags:
        - Taxons
      security:
        - spree_api_key_header: []
        - spree_api_key_param: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: no content
        '401':
          description: unauthorized

  # ============================================================
  # REPORTS
  # ============================================================

  /reports/{report_type}:
    get:
      summary: Fetch report data (no subtype)
      description: |
        Returns report data as JSON for report types that have **no subtype**.

        **Feature flag required** — this route only exists when the `api_reports` feature
        flag is enabled on the OFN instance. When disabled the route is not registered
        and the request falls through to a 404. Contact your instance administrator.

        **Authentication** — requires an admin or manager API token. Regular user tokens
        are rejected with 403.

        **Mandatory query params** — `q[completed_at_gt]` and `q[completed_at_lt]` must
        both be present; omitting them returns 422. Use a narrow date window (≤ 30 days)
        to avoid timeouts on large datasets.

        ### Report types with no subtype

        | `report_type` | Description |
        |---|---|
        | `orders_and_distributors` | Orders grouped by distributor |
        | `customers` | Customer list with contact details |
        | `users_and_enterprises` | Users and their associated enterprises |
        | `revenues_by_hub` | Revenue breakdown per hub |

        Report types that **require a subtype** must use
        `GET /reports/{report_type}/{report_subtype}` instead.
      tags:
        - Reports
      security:
        - spree_api_key_header: []
        - spree_api_key_param: []
      parameters:
        - name: report_type
          in: path
          required: true
          description: Report type slug (no-subtype reports only)
          schema:
            type: string
            enum:
              - orders_and_distributors
              - customers
              - users_and_enterprises
              - revenues_by_hub
          example: orders_and_distributors
        - name: q[completed_at_gt]
          in: query
          required: true
          description: Filter — orders completed after this datetime (ISO 8601)
          schema:
            type: string
            format: date-time
          example: "2024-06-01T00:00:00Z"
        - name: q[completed_at_lt]
          in: query
          required: true
          description: Filter — orders completed before this datetime (ISO 8601)
          schema:
            type: string
            format: date-time
          example: "2024-06-30T23:59:59Z"
        - name: q[distributor_id_in][]
          in: query
          description: Filter by distributor enterprise IDs
          schema:
            type: array
            items:
              type: integer
        - name: q[order_cycle_id_in][]
          in: query
          description: Filter by order cycle IDs
          schema:
            type: array
            items:
              type: integer
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    description: Array of report row objects. Structure depends on report_type.
                    items:
                      type: object
              examples:
                example:
                  value:
                    data:
                      - order_number: R123456789
                        order_date: "2024-06-15"
                        distributor: Green Hub
                        customer: alice@example.com
                        total: "42.00"
        '404':
          description: |
            Route not registered — the `api_reports` feature flag is disabled on this
            instance, or the `report_type` slug is not recognised.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_response'
        '422':
          description: |
            `q[completed_at_gt]` and/or `q[completed_at_lt]` are missing, or the
            report type is not found in the report registry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_response'

  /reports/{report_type}/{report_subtype}:
    get:
      summary: Fetch report data (with subtype)
      description: |
        Returns report data as JSON for report types that require a **subtype** selector.

        Subject to the same **feature flag**, **authentication**, and **mandatory
        `q` params** requirements as `GET /reports/{report_type}`.

        ### Report types and their valid subtypes

        | `report_type` | `report_subtype` values |
        |---|---|
        | `bulk_coop` | `supplier_report`, `allocation`, `packing_sheets`, `customer_payments` |
        | `payments` | `payments_by_payment_type`, `itemised_payment_totals`, `payment_totals` |
        | `orders_and_fulfillment` | `order_cycle_supplier_totals`, `order_cycle_supplier_totals_by_distributor`, `order_cycle_distributor_totals_by_supplier`, `order_cycle_customer_totals` |
        | `products_and_inventory` | `all_products`, `inventory` *(deprecated)*, `lettuce_share` |
        | `enterprise_fee_summary` | `fee_summary`, `enterprise_fees_with_tax_report_by_order` ⚠️, `enterprise_fees_with_tax_report_by_producer` |
        | `order_cycle_management` | `payment_methods`, `delivery` |
        | `sales_tax` | `tax_types`, `tax_rates`, `sales_tax_totals_by_producer`, `sales_tax_totals_by_order` |
        | `xero_invoices` | `summary`, `detailed` |
        | `packing` | `customer` ⚠️, `supplier` ⚠️, `product` ⚠️ |
        | `suppliers` | `pay_your_suppliers` |

        > **⚠️ Known server bugs** — the following subtypes return `422` due to Ruby exceptions
        > in the report query layer (not missing parameters):
        > - `packing/customer`, `packing/supplier`, `packing/product` — Arel nil-type crash
        >   in `joins_selected_shipping_methods` (`shipping_rate_table[:selected].eq(true)`)
        > - `enterprise_fee_summary/enterprise_fees_with_tax_report_by_order` — `nil.compact_blank`
      tags:
        - Reports
      security:
        - spree_api_key_header: []
        - spree_api_key_param: []
      parameters:
        - name: report_type
          in: path
          required: true
          description: Report type slug (subtype-based reports only)
          schema:
            type: string
            enum:
              - bulk_coop
              - payments
              - orders_and_fulfillment
              - products_and_inventory
              - enterprise_fee_summary
              - order_cycle_management
              - sales_tax
              - xero_invoices
              - packing
              - suppliers
          example: bulk_coop
        - name: report_subtype
          in: path
          required: true
          description: Report subtype slug — see table above for valid values per report_type
          schema:
            type: string
            enum:
              - supplier_report
              - allocation
              - packing_sheets
              - customer_payments
              - payments_by_payment_type
              - itemised_payment_totals
              - payment_totals
              - order_cycle_supplier_totals
              - order_cycle_supplier_totals_by_distributor
              - order_cycle_distributor_totals_by_supplier
              - order_cycle_customer_totals
              - all_products
              - inventory
              - lettuce_share
              - fee_summary
              - enterprise_fees_with_tax_report_by_order
              - enterprise_fees_with_tax_report_by_producer
              - payment_methods
              - delivery
              - tax_types
              - tax_rates
              - sales_tax_totals_by_producer
              - sales_tax_totals_by_order
              - summary
              - detailed
              - customer
              - supplier
              - product
              - pay_your_suppliers
          example: supplier_report
        - name: q[completed_at_gt]
          in: query
          required: true
          description: Filter — orders completed after this datetime (ISO 8601)
          schema:
            type: string
            format: date-time
          example: "2024-06-01T00:00:00Z"
        - name: q[completed_at_lt]
          in: query
          required: true
          description: Filter — orders completed before this datetime (ISO 8601)
          schema:
            type: string
            format: date-time
          example: "2024-06-30T23:59:59Z"
        - name: q[distributor_id_in][]
          in: query
          description: Filter by distributor enterprise IDs
          schema:
            type: array
            items:
              type: integer
        - name: q[order_cycle_id_in][]
          in: query
          description: Filter by order cycle IDs
          schema:
            type: array
            items:
              type: integer
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    description: Array of report row objects. Structure depends on report_type/subtype.
                    items:
                      type: object
        '404':
          description: |
            Route not registered — the `api_reports` feature flag is disabled on this
            instance, or the `report_type` / `report_subtype` slug is not recognised.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_response'
        '422':
          description: |
            Missing required `q` params, invalid report type/subtype, or a known
            server-side Ruby exception in the report query layer. Affected subtypes:
            `packing/customer`, `packing/supplier`, `packing/product` (Arel nil-type crash),
            `enterprise_fee_summary/enterprise_fees_with_tax_report_by_order` (nil.compact_blank).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_response'

  # ============================================================
  # STATUS
  # ============================================================

  /status/job_queue:
    get:
      summary: Check job queue health
      description: |
        Returns whether the background job queue is alive, based on the last
        heartbeat timestamp. Returns `alive: false` if no heartbeat has been
        recorded in the last 6 minutes.
        No authentication required.
      tags:
        - Status
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  alive:
                    type: boolean
                    example: true
              examples:
                alive:
                  value:
                    alive: true
                dead:
                  value:
                    alive: false
