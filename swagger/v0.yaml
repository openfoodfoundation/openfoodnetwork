          content:
            application/json:
              schema:
                $ref: '#/components/schemas/shipment'

  /orders/{order_id}/shipments/{id}/add:
    put:
      summary: Add variant to shipment
      description: Adds more quantity of a variant to an existing shipment.
      tags:
        - Shipments
      security:
        - spree_api_key_header: []
        - spree_api_key_param: []
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          description: Shipment number
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
