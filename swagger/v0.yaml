        - spree_api_key_param: []
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          description: Shipment number
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
