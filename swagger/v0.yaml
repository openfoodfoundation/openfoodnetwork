        '422':
          description: order is cancelled

  # ============================================================
  # ENTERPRISES
  # ============================================================

  /enterprises:
    post:
      summary: Create enterprise
      description: |
        Creates a new enterprise. The `owner_id` is automatically set to the authenticated user.
        The `sells` field is set based on whether the user already owns a hub.
        The `visible` field is forced to `only_through_links` on creation.
      tags:
        - Enterprises
      security:
        - spree_api_key_header: []
        - spree_api_key_param: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - enterprise
              properties:
                enterprise:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                      example: Green Farm
                    is_primary_producer:
                      type: boolean
                      example: true
                    description:
                      type: string
                    phone:
                      type: string
                    email:
                      type: string
                    website:
                      type: string
                    instagram:
                      type: string
                    facebook:
                      type: string
                    twitter:
                      type: string
                    linkedin:
                      type: string
                    address_attributes:
                      type: object
                      properties:
                        address1:
                          type: string
                        city:
                          type: string
                        zipcode:
                          type: string
                        state_id:
                          type: integer
                        country_id:
                          type: integer
      responses:
        '201':
          description: created — returns the new enterprise ID
          content:
            application/json:
              schema:
                type: integer
                example: 10
        '422':
          description: invalid resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_response'

  /enterprises/{id}:
    put:
      summary: Update enterprise
      description: |
        Updates an enterprise. Non-admin users cannot change the `type` field.
        `owner_id` is always set to the current user.
      tags:
        - Enterprises
      security:
        - spree_api_key_header: []
        - spree_api_key_param: []
      parameters:
        - name: id
          in: path
          description: Enterprise ID or permalink
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - enterprise
              properties:
                enterprise:
                  type: object
                  properties:
                    name:
                      type: string
                    description:
                      type: string
                    long_description:
                      type: string
                    phone:
                      type: string
                    email:
                      type: string
                    website:
                      type: string
                    instagram:
                      type: string
                    facebook:
                      type: string
                    twitter:
                      type: string
                    linkedin:
                      type: string
                    visible:
                      type: string
                      enum: [only_through_links, public, hidden]
                    require_login:
                      type: boolean
                    allow_guest_orders:
                      type: boolean
                    allow_order_changes:
                      type: boolean
                    show_customer_names_to_suppliers:
                      type: boolean
                    show_customer_contacts_to_suppliers:
                      type: boolean
                    preferred_shopfront_message:
                      type: string
                    preferred_shopfront_closed_message:
                      type: string
                    address_attributes:
                      type: object
                      properties:
                        address1:
                          type: string
                        city:
                          type: string
                        zipcode:
                          type: string
                        state_id:
                          type: integer
                        country_id:
                          type: integer
      responses:
        '200':
          description: successful — returns the enterprise ID
          content:
            application/json:
              schema:
                type: integer
                example: 10
        '422':
          description: invalid resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_response'

  /enterprises/{id}/update_image:
    post:
      summary: Upload enterprise logo or promo image
      description: |
        Uploads a logo (`logo` field) or promo image (`promo` field) for the enterprise.
        Returns the URL of the uploaded image at medium size.
        Request must be sent as `multipart/form-data`.
      tags:
        - Enterprises
      security:
        - spree_api_key_header: []
        - spree_api_key_param: []
      parameters:
        - name: id
          in: path
          description: Enterprise ID or permalink
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                logo:
                  type: string
                  format: binary
                  description: Logo image file (send either logo or promo, not both)
                promo:
                  type: string
                  format: binary
                  description: Promo image file (send either logo or promo, not both)
      responses:
        '200':
          description: successful — returns the image URL as HTML
          content:
            text/html:
              example: https://example.com/enterprises/logo/medium/image.jpg
        '422':
          description: invalid resource

  /enterprises/{enterprise_id}/logo:
    delete:
      summary: Remove enterprise logo
      tags:
        - Enterprises
      security:
        - spree_api_key_header: []
        - spree_api_key_param: []
      parameters:
        - name: enterprise_id
          in: path
          description: Enterprise permalink
          required: true
          schema:
            type: string
      responses:
        '200':
          description: successful — returns updated enterprise object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/enterprise'
        '409':
          description: no logo attached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_response'
        '401':
          description: unauthorized

  /enterprises/{enterprise_id}/promo_image:
    delete:
      summary: Remove enterprise promo image
      tags:
        - Enterprises
      security:
        - spree_api_key_header: []
        - spree_api_key_param: []
      parameters:
        - name: enterprise_id
          in: path
          description: Enterprise permalink
          required: true
          schema:
            type: string
      responses:
        '200':
          description: successful — returns updated enterprise object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/enterprise'
        '409':
          description: no promo image attached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_response'

  /enterprises/{enterprise_id}/terms_and_conditions:
    delete:
      summary: Remove enterprise terms and conditions PDF
      tags:
        - Enterprises
      security:
        - spree_api_key_header: []
        - spree_api_key_param: []
      parameters:
        - name: enterprise_id
          in: path
          description: Enterprise permalink
          required: true
          schema:
            type: string
      responses:
        '200':
          description: successful — returns updated enterprise object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/enterprise'
        '409':
          description: no terms and conditions file attached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_response'

  # ============================================================
  # SHOPS
  # ============================================================

  /shops/{id}:
    get:
      summary: Show shop (enterprise shopfront detail)
      description: |
        Returns full shopfront data for an enterprise including producers, taxons,
        properties, active status and delivery/pickup options.
        No authentication required.
