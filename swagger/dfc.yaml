---
openapi: 3.0.1
info:
  title: OFN DFC API
  version: v0.1.7
  description: |
    Our DFC API implements the [Data Food Consortium] standard. It serves and
    reads semantic data encoded in JSON-LD ([Official Examples]).

    You can read about current developments in our [Community Forum].

    This documentation is generated by our automated tests.
    If you modify any part of this API, please update the documentation as well:

    ```
    ./script/rswag engines/dfc_provider
    ```

    [Data Food Consortium]: https://github.com/datafoodconsortium
    [Official Examples]: https://docs.dfc-standard.org/dfc-standard-documentation/appendixes/practical-examples
    [Community Forum]: https://community.openfoodnetwork.org/t/3610
components:
  securitySchemes:
    oidc_token:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        OpenID Connect token from a trusted platform:
        <ul>
          <li><a href="https://login.lescommuns.org/auth/" target="_blank">Les Communs</a></li>
        </ul>
    ofn_api_token:
      type: apiKey
      in: header
      name: X-Api-Token
      description: API token of an authorized OFN user
    ofn_session:
      type: apiKey
      in: cookie
      name: _ofn_session_id
      description: 'Session cookie of a logged in user. It allows only read access
        due to CSRF protection.

        '
security:
- oidc_token: []
- ofn_api_token: []
- ofn_session: []
paths:
  "/api/dfc/addresses/{id}":
    get:
      summary: Show address
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: Accept
        in: header
        schema:
          type: string
      tags:
      - Addresses
      responses:
        '200':
          description: successful
          content:
            application/json; charset=utf-8:
              examples:
                in DFC v1 format:
                  value:
                    "@context": https://w3id.org/dfc/ontology/context/context_1.16.0.json
                    "@id": http://test.host/api/dfc/addresses/40000
                    "@type": dfc-b:Address
                    dfc-b:hasStreet: 10 Lovely Street
                    dfc-b:hasPostalCode: '20170'
                    dfc-b:hasCity: Herndon
                    dfc-b:hasCountry: http://publications.europa.eu/resource/authority/country/AUS
                    dfc-b:region: Victoria
            application/ld+json; profile="dfc-v2"; charset=utf-8:
              examples:
                in DFC v2 format:
                  value:
                    "@context": https://www.datafoodconsortium.org
                    "@id": http://test.host/api/dfc/addresses/40000
                    "@type": dfc-b:Address
                    dfc-b:hasStreet: 10 Lovely Street
                    dfc-b:hasPostalCode: '20170'
                    dfc-b:hasCity: Herndon
                    dfc-b:hasCountry: http://publications.europa.eu/resource/authority/country/AUS
                    dfc-b:region: Victoria
        '404':
          description: not found
  "/api/dfc/affiliate_sales_data":
    parameters:
    - name: startDate
      in: query
      schema:
        type: string
    - name: endDate
      in: query
      schema:
        type: string
    get:
      summary: Show sales data of person's affiliate enterprises
      tags:
      - AffiliateSalesData
      responses:
        '200':
          description: successful
          content:
            application/json; charset=utf-8:
              examples:
                with date filters:
                  value:
                    "@context": https://w3id.org/dfc/ontology/context/context_1.16.0.json
                    "@id": http://test.host/api/dfc/affiliate_sales_data
                    "@type": dfc-b:Person
                not filtered:
                  value:
                    "@context": https://w3id.org/dfc/ontology/context/context_1.16.0.json
                    "@id": http://test.host/api/dfc/affiliate_sales_data
                    "@type": dfc-b:Person
                    dfc-b:affiliates:
                      "@type": dfc-b:Enterprise
                      dfc-b:hasAddress:
                        "@type": dfc-b:Address
                        dfc-b:hasPostalCode: '20170'
                        dfc-b:hasCountry: Australia
                      dfc-b:supplies:
                        "@type": dfc-b:SuppliedProduct
                        dfc-b:name: Tomato
                        dfc-b:hasQuantity:
                          "@type": dfc-b:QuantitativeValue
                          dfc-b:hasUnit: dfc-m:Gram
                          dfc-b:value: 1.0
                        dfc-b:concernedBy:
                          "@type": dfc-b:OrderLine
                          dfc-b:quantity:
                            "@type": dfc-b:QuantitativeValue
                            dfc-b:hasUnit: dfc-m:Piece
                            dfc-b:value: 1.0
                          dfc-b:hasPrice:
                            "@type": dfc-b:QuantitativeValue
                            dfc-b:value: 10.0
                          dfc-b:partOf:
                            "@type": dfc-b:Order
                            dfc-b:belongsTo:
                              "@type": dfc-b:SaleSession
                              dfc-b:objectOf:
                                "@type": dfc-b:Coordination
                                dfc-b:coordinatedBy:
                                  "@type": dfc-b:Enterprise
                                  dfc-b:hasAddress:
                                    "@type": dfc-b:Address
                                    dfc-b:hasPostalCode: '20170'
                                    dfc-b:hasCountry: Australia
        '400':
          description: bad request
