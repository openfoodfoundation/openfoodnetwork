                      dfc-b:managedBy: http://test.host/api/dfc/enterprises/10000
                    - "@id": http://test.host/api/dfc/enterprises/10000/offers/10001
                      "@type": dfc-b:Offer
                      dfc-b:hasPrice:
                        "@type": dfc-b:Price
                        dfc-b:value: 19.99
                        dfc-b:hasUnit: dfc-m:AustralianDollar
                      dfc-b:stockLimitation: 0
        '404':
          description: not found
    put:
      summary: Update CatalogItem
      parameters: []
      tags:
      - CatalogItems
      responses:
        '204':
          description: no content
      requestBody:
        content:
          application/json:
            schema:
              example:
                "@context":
                  rdfs: http://www.w3.org/2000/01/rdf-schema#
                  skos: http://www.w3.org/2004/02/skos/core#
                  dfc: http://static.datafoodconsortium.org/ontologies/DFC_FullModel.owl#
